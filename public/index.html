<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoedTech AI E-Book Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">

        <!-- SOL PANEL -->
        <aside class="toolbox">
            <div class="page-settings" style="padding: 15px; background: #fff; border-bottom: 1px solid #eee; margin-bottom: 20px; border-radius: 8px;">
                <label style="font-weight: bold; font-size: 13px; color: #4a5568;">📄 Sayfa Boyutu:</label>
                <select id="page-format" style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer;">
                    <option value="a4">A4 (Standart)</option>
                    <option value="a3">A3 (Büyük)</option>
                    <option value="a5">A5 (Küçük)</option>
                </select>
            </div>

            <h3>🛠️ Araçlar</h3>
            <p class="desc">Tuvale sürükleyin</p>

            <div class="tool-item" draggable="true" data-type="text">📝 Metin Bloğu</div>
            <div class="tool-item" draggable="true" data-type="image">🖼️ AI Görsel</div>
            <div class="tool-item" draggable="true" data-type="video">🎥 AI Video</div>

            <div class="question-menu">
                <div class="tool-item">❓ AI Soru Seti</div>

                <div class="quiz-options">
                    <div class="tool-item" draggable="true" data-type="quiz-mcq">Çoktan Seçmeli</div>
                    <div class="tool-item" draggable="true" data-type="quiz-fill">Boşluk Doldurma</div>
                    <div class="tool-item" draggable="true" data-type="quiz-truefalse">Doğru / Yanlış</div>
                    <div class="tool-item" draggable="true" data-type="quiz-short">Kısa Cevap</div>
                </div>
            </div>
        </aside>

        <!-- ORTA (CANVAS) -->
        <main class="canvas-container">
            <div class="canvas-header">📄 Sayfa 1</div>
            
            <div id="canvas" class="canvas format-a4">
                <div class="empty-state">İçerik oluşturmak için sol taraftan araç sürükleyin</div>
            </div>
        </main>

        <!-- SAĞ PANEL -->
        <aside class="properties-panel">
            <h3>✨ AI Asistan</h3>

            <div id="no-selection" class="panel-msg">
                Düzenlemek için tuvalden bir öge seçin.
            </div>

            <!-- BLOK İÇİN AI -->
            <div id="ai-controls" style="display: none;">
                <div class="selected-badge" id="selected-type">Seçilen: Metin</div>

                <textarea id="ai-prompt" placeholder="Yapay zekaya ne istediğinizi yazın..."></textarea>

                <button id="btn-generate" class="btn-primary">
                    Yapay Zeka İle Üret
                </button>
            </div>

            <!-- ✅ YENİ: PAGE ORCHESTRATOR BUTONU -->
            <h4 style="margin-top: 20px;">🚀 Tüm Sayfa</h4>

            <button id="generatePageBtn" style="
                width: 100%;
                padding: 12px;
                margin-top: 10px;
                background: #6b46c1;
                color: white;
                border: none;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
            ">
                ✨ Sayfayı AI ile Oluştur
            </button>

            <!-- DİĞER BUTONLAR -->
            <button id="btn-copyright" style="width: 100%; padding: 12px; background: #e53e3e; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold;">
                Telif ve İntihal Kontrolü
            </button>

            <button id="btn-analyze" style="width: 100%; padding: 12px; background: #ecc94b; color: #744210; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: bold;">
                İçerik Bütünlüğünü Analiz Et
            </button>

            <div id="analysis-report" style="display: none; margin-top: 15px;"></div>

            <button id="btn-export" style="width: 100%; padding: 12px; background: #48bb78; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 30px; font-weight: bold;">
                Sayfayı PDF Olarak Kaydet
            </button>

        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
